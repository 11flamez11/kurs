<div class="auth-page">
  <div class="auth-inner">
    <div class="auth-brand">NetMonitor</div>
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Регистрация</h1>
        <p>Создайте учётную запись для доступа к мониторингу</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="auth-form">
        @if (errorMessage) {
          <div class="auth-error">{{ errorMessage }}</div>
        }

        @if (successMessage) {
          <div class="auth-success">{{ successMessage }}</div>
        }

        <div class="form-group">
          <label for="username">Логин</label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder="Придумайте логин"
            autocomplete="username"
            [disabled]="isLoading"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Минимум 4 символа"
            autocomplete="new-password"
            [disabled]="isLoading"
            required
            minlength="6"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Подтвердите пароль</label>
          <input
            type="password"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Повторите пароль"
            autocomplete="new-password"
            [disabled]="isLoading"
            required
          />
        </div>

        <button type="submit" class="auth-submit" [disabled]="isLoading">
          @if (!isLoading) {
            <span>Зарегистрироваться</span>
          } @else {
            <span>Регистрация…</span>
          }
        </button>
      </form>

      <div class="auth-footer">
        <p>Уже есть аккаунт?</p>
        <a routerLink="/login">Войти</a>
      </div>
    </div>
  </div>
</div>
