<header class="main-header">
  <div class="header-left">
    <h1>NetMonitor</h1>
    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">Хосты</a>
      <a routerLink="/metrics" routerLinkActive="active">Мониторинг</a>
      <a routerLink="/events" routerLinkActive="active">Алерты</a>
      <a routerLink="/interfaces" routerLinkActive="active">Интерфейсы</a>
      @if (isAdmin) {
        <a routerLink="/admin/users" routerLinkActive="active">Пользователи</a>
      }
    </nav>
  </div>

  <div class="header-right">
    <span class="username">{{ username }}</span>
    @if (isAdmin) {
      <span class="badge">ADMIN</span>
    }
    <button (click)="logout()" class="logout-btn">Выйти</button>
  </div>
</header>
