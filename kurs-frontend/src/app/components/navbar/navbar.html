<header class="main-header">
  <div class="header-left">
    <h1>Мониторинг параметров</h1>
    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">Устройства</a>
      <a routerLink="/metrics" routerLinkActive="active">Метрики</a>
      <a routerLink="/events" routerLinkActive="active">События</a>
      <a routerLink="/interfaces" routerLinkActive="active">Интерфейсы</a>
    </nav>
  </div>

  <div class="header-right">
    <span class="username">{{ username }}</span>
    @if (isAdmin) {
      <span class="badge">ADMIN</span>
    }
    <button (click)="logout()" class="logout-btn">Выйти</button>
  </div>
</header>
